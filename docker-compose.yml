version: "3.8"

services:
  db:
    image: postgres:16
    container_name: janymda_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: janymda
    ports:
      - "5432:5432"
    volumes:
      - janymda_pg:/var/lib/postgresql/data

  api:
    build: .
    container_name: janymda_backend
    depends_on:
      - db
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: janymda
      JWT_SECRET: "janymda_super_secret_123"
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./static/uploads:/app/static/uploads



volumes:
  janymda_pg: