version: "3.8"

services:
  db:
    image: postgres:16
    container_name: janymda_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: janymda
    ports:
      - "5432:5432"
    volumes:
      - janymda_pg:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: janymda_backend_dev
    depends_on:
      - db
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: janymda
      JWT_SECRET: "janymda_super_secret_123"
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - ./static/uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: janymda_frontend_dev
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: "http://api:8080"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

volumes:
  janymda_pg: